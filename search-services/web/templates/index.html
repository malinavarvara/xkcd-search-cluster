<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Блок заголовка -->
    <div class="container">
        <h1>XKCD Search</h1>
        <form action="/search" method="GET">
            <input type="text" name="search" placeholder="Enter phrase...">
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- Блок результатов -->
    <div class="comic-grid">
        {{range .Comics}}
        <div class="container">
            <h3>{{.Title}}</h3>
            <img src="{{.ImgURL}}" alt="Comic #{{.ID}}" style="max-width: 100%;">
            <p>#{{.ID}}</p>
        </div>
        {{end}}
    </div>
</body>
</html>
